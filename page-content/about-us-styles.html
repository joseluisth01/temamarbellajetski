    <style>
        :root {
            --gold: #ffc300;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        /* ============================================================
           HERO SECTION - Full Video Background with Particles
        ============================================================ */
        .daniel-hero {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .hero-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(3, 4, 94, 0.85) 0%, rgba(2, 62, 138, 0.75) 50%, rgba(0, 119, 182, 0.7) 100%);
            z-index: 1;
        }
        
        .hero-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float-particle 15s infinite ease-in-out;
        }
        
        @keyframes float-particle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
        
        .hero-gradient-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(transparent, rgba(10,10,26,0.95));
            z-index: 3;
        }
        
        .daniel-hero-content {
            position: relative;
            z-index: 4;
            text-align: center;
            max-width: 800px;
            padding: 120px 20px 80px;
        }
        
        .hero-badge-animated {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 195, 0, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid var(--gold);
            padding: 14px 30px;
            border-radius: 60px;
            color: var(--gold);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 195, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 195, 0, 0.6); }
        }
        
        .hero-badge-animated i {
            font-size: 20px;
            animation: trophy-bounce 2s ease-in-out infinite;
        }
        
        @keyframes trophy-bounce {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg) scale(1.1); }
        }
        
        .daniel-hero h1 {
            font-size: clamp(32px, 5.5vw, 64px);
            font-weight: 900;
            color: var(--white);
            line-height: 1.05;
            margin-bottom: 25px;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .daniel-hero h1 .name-highlight {
            display: block;
            background: linear-gradient(135deg, #00d4ff 0%, #00b4d8 50%, #0077b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }
        
        .daniel-hero h1 .name-highlight::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 4px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }
        
        .hero-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            margin-bottom: 50px;
            line-height: 1.7;
        }
        
        .hero-subtitle strong {
            color: var(--gold);
            font-weight: 600;
        }

        /* Animated Stats Row */
        .hero-stats-animated {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            min-width: 140px;
            transition: all 0.4s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-light);
        }
        
        .stat-card .stat-number {
            display: block;
            font-size: 48px;
            font-weight: 900;
            color: var(--white);
            line-height: 1;
        }
        
        .stat-card .stat-number.gold { color: var(--gold); }
        
        .stat-card .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }
        
        /* Hero CTA Buttons */
        .hero-cta-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .hero-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.4s ease;
            cursor: pointer;
            border: none;
        }
        
        .hero-btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0077b6);
            color: white;
            box-shadow: 0 10px 40px rgba(0, 180, 216, 0.4);
        }
        
        .hero-btn-primary:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 15px 50px rgba(0, 180, 216, 0.5);
        }
        
        .hero-btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        
        .hero-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            transform: translateY(-4px);
        }
        
        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: scroll-bounce 2s infinite;
        }
        
        .scroll-indicator i {
            font-size: 24px;
        }
        
        @keyframes scroll-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* ============================================================
           STORY SECTION - Split Layout with Parallax
        ============================================================ */
        .story-section {
            padding: 120px 20px;
            background: linear-gradient(180deg, #ffffff 0%, #f0f9ff 100%);
            position: relative;
            overflow: hidden;
        }
        
        .story-container {
            max-width: 1300px;
            margin: 0 auto;
        }
        
        .story-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 100px;
            align-items: center;
        }
        
        .story-visual {
            position: relative;
        }
        
        .story-main-image {
            position: relative;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
        }
        
        .story-main-image img {
            width: 100%;
            height: 600px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .story-main-image:hover img {
            transform: scale(1.05);
        }
        
        .floating-medal {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: float 4s ease-in-out infinite;
            z-index: 10;
        }
        
        .floating-medal.gold-medal {
            top: -30px;
            right: -30px;
            background: linear-gradient(135deg, #ffd700, #ffb300);
        }
        
        .floating-medal.champion-badge {
            bottom: 60px;
            left: -40px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            animation-delay: 1s;
        }
        
        .floating-medal .medal-icon {
            font-size: 40px;
            color: white;
        }
        
        .floating-medal .medal-text {
            font-size: 12px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        
        .floating-medal .medal-big {
            font-size: 32px;
            font-weight: 900;
            color: white;
            line-height: 1;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(3deg); }
            75% { transform: translateY(10px) rotate(-3deg); }
        }
        
        .story-content {
            padding-right: 20px;
        }
        
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .section-label::before {
            content: '';
            width: 40px;
            height: 2px;
            background: var(--gradient-primary);
        }
        
        .story-content h2 {
            font-size: clamp(32px, 4.5vw, 54px);
            font-weight: 800;
            color: var(--dark);
            line-height: 1.15;
            margin-bottom: 30px;
        }
        
        .story-content h2 .gradient-text {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .story-lead {
            font-size: 20px;
            color: var(--gray-700);
            line-height: 1.8;
            margin-bottom: 25px;
            padding-left: 25px;
            border-left: 4px solid var(--primary);
        }
        
        .story-text {
            font-size: 17px;
            color: var(--gray-600);
            line-height: 1.9;
            margin-bottom: 20px;
        }

        /* Credentials Grid */
        .credentials-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 40px;
        }
        
        .credential-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: white;
            padding: 20px 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--gray-200);
            transition: all 0.4s ease;
        }
        
        .credential-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-light);
        }
        
        .credential-card .icon {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-primary);
            color: white;
            border-radius: 14px;
            font-size: 22px;
            flex-shrink: 0;
        }
        
        .credential-card .text strong {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 3px;
        }
        
        .credential-card .text span {
            font-size: 13px;
            color: var(--gray-500);
        }

        /* ============================================================
           CHAMPIONSHIPS SECTION - Premium Medal Display
        ============================================================ */
        .championships-section {
            padding: 120px 20px;
            background: linear-gradient(135deg, #03045e 0%, #023e8a 40%, #0077b6 100%);
            position: relative;
            overflow: hidden;
        }
        
        .championships-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--silver), var(--gold));
        }
        
        .champ-bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        .champ-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .champ-header {
            text-align: center;
            margin-bottom: 70px;
        }
        
        .champ-header .section-label {
            color: var(--primary-light);
        }
        
        .champ-header .section-label::before {
            background: var(--primary-light);
        }
        
        .champ-header h2 {
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
        }
        
        .champ-header h2 span {
            color: var(--gold);
        }
        
        .champ-header p {
            font-size: 19px;
            color: rgba(255, 255, 255, 0.7);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.7;
        }
        
        /* Medal Summary Cards */
        .medal-summary-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }
        
        .medal-summary-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .medal-summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        
        .medal-summary-card.gold-card::before { background: var(--gold); }
        .medal-summary-card.silver-card::before { background: var(--silver); }
        .medal-summary-card.bronze-card::before { background: var(--bronze); }
        
        .medal-summary-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.12);
        }
        
        .medal-summary-card .medal-emoji {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }
        
        .medal-summary-card .count {
            font-size: 60px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
        }
        
        .medal-summary-card.gold-card .count { color: var(--gold); }
        .medal-summary-card.silver-card .count { color: var(--silver); }
        .medal-summary-card.bronze-card .count { color: var(--bronze); }
        
        .medal-summary-card .type {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Championship Cards */
        .champ-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .champ-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 45px 40px;
            position: relative;
            overflow: hidden;
        }
        
        .champ-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
        }
        
        .champ-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .champ-card-header .flag {
            width: 50px;
            height: 35px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .champ-card-header .icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gold), #ff9500);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        
        .champ-card-header h3 {
            font-size: 22px;
            font-weight: 700;
            color: white;
        }
        
        .champ-card-header .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .medal-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .medal-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }
        
        .medal-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(8px);
        }
        
        .medal-item .medal-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }
        
        .medal-item .medal-icon.gold { background: linear-gradient(135deg, #ffc300, #ff9500); box-shadow: 0 5px 20px rgba(255, 195, 0, 0.4); }
        .medal-item .medal-icon.silver { background: linear-gradient(135deg, #e0e0e0, #a0a0a0); box-shadow: 0 5px 20px rgba(192, 192, 192, 0.4); }
        .medal-item .medal-icon.bronze { background: linear-gradient(135deg, #cd7f32, #8b4513); box-shadow: 0 5px 20px rgba(205, 127, 50, 0.4); }
        
        .medal-item .medal-info {
            flex: 1;
        }
        
        .medal-item .discipline {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }
        
        .medal-item .category {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .medal-item .position {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 16px;
            border-radius: 50px;
        }
        
        .medal-item .position.gold { color: var(--gold); border: 1px solid rgba(255, 195, 0, 0.3); }
        .medal-item .position.silver { color: var(--silver); border: 1px solid rgba(192, 192, 192, 0.3); }
        .medal-item .position.bronze { color: var(--bronze); border: 1px solid rgba(205, 127, 50, 0.3); }
        
        .federation-footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .federation-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .federation-logos .fed-logo {
            height: 50px;
            opacity: 0.7;
            filter: brightness(0) invert(1);
            transition: all 0.3s ease;
        }
        
        .federation-logos .fed-logo:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .federation-footer p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.7;
        }
        
        .federation-footer strong {
            color: rgba(255, 255, 255, 0.8);
        }

        /* ============================================================
           VIDEO ACTION SECTION - Racing Videos Grid
        ============================================================ */
        .video-action-section {
            padding: 120px 20px;
            background: linear-gradient(180deg, #f0f9ff 0%, #ffffff 100%);
            position: relative;
        }
        
        .video-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .video-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .video-header h2 {
            font-size: clamp(32px, 4.5vw, 50px);
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 15px;
        }
        
        .video-header p {
            font-size: 18px;
            color: var(--gray-600);
            max-width: 700px;
            margin: 0 auto;
        }
        
        .racing-videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .racing-video-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            background: var(--white);
            transition: all 0.4s ease;
        }
        
        .racing-video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.18);
        }
        
        .racing-video-card video {
            width: 100%;
            aspect-ratio: 4/3;
            display: block;
            object-fit: cover;
            background: #000;
        }
        
        .racing-video-card .video-info {
            padding: 18px 22px;
        }
        
        .racing-video-card .video-info h4 {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 4px;
        }
        
        .racing-video-card .video-info span {
            font-size: 13px;
            color: var(--gray-500);
        }
        
        .racing-video-card .video-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .racing-featured-video {
            grid-column: 1 / -1;
        }

        .racing-featured-video video {
            aspect-ratio: 16/9;
        }

        /* ============================================================
           RACING PHOTO GALLERY
        ============================================================ */
        .racing-gallery-section {
            padding: 120px 20px;
            background: linear-gradient(180deg, #03045e 0%, #023e8a 50%, #0077b6 100%);
            position: relative;
        }

    <style>
        /* ========== Booking Page Specific Styles ========== */
        .booking-page-hero {
            background: linear-gradient(135deg, #03045e 0%, #0077b6 50%, #00b4d8 100%);
            padding: 120px 0 80px;
            text-align: center;
            color: white;
        }
        .booking-page-hero h1 {
            font-family: var(--font-display);
            font-size: clamp(32px, 5.5vw, 64px);
            margin-bottom: 15px;
        }
        .booking-page-hero p {
            font-size: 16px;
            opacity: 0.85;
            max-width: 600px;
            margin: 0 auto;
        }

        .booking-main {
            padding: 60px 0 100px;
            background: #f8fbfe;
        }

        .booking-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            align-items: start;
        }

        /* ========== Booking Steps ========== */
        .booking-steps {
            display: flex;
            gap: 0;
            margin-bottom: 40px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .step {
            flex: 1;
            padding: 18px 20px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--gray-400);
            border-bottom: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .step.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: rgba(0, 180, 216, 0.04);
        }
        .step.completed {
            color: #10b981;
            border-bottom-color: #10b981;
        }
        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gray-200);
            color: var(--gray-500);
            font-size: 0.8rem;
            margin-right: 8px;
        }
        .step.active .step-number {
            background: var(--primary);
            color: white;
        }
        .step.completed .step-number {
            background: #10b981;
            color: white;
        }

        /* ========== Step Panels ========== */
        .step-panel {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .step-panel.active { display: block; }
        .step-panel h3 {
            font-size: 1.4rem;
            color: var(--dark);
            margin-bottom: 25px;
        }

        /* ========== Activity Selection ========== */
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .cat-tab {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid var(--gray-200);
            background: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .cat-tab:hover, .cat-tab.active {
            border-color: var(--primary);
            background: rgba(0, 180, 216, 0.06);
            color: var(--primary);
        }

        .activity-options {
            display: grid;
            gap: 12px;
        }
        .activity-option {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 15px;
            padding: 18px 20px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .activity-option:hover {
            border-color: var(--primary-light);
            background: rgba(0, 180, 216, 0.02);
        }
        .activity-option.selected {
            border-color: var(--primary);
            background: rgba(0, 180, 216, 0.06);
            box-shadow: 0 0 0 1px var(--primary);
        }
        .activity-option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }
        .activity-option .name {
            font-weight: 600;
            color: var(--dark);
        }
        .activity-option .duration {
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        .activity-option .capacity {
            font-size: 0.8rem;
            color: var(--gray-400);
            background: var(--gray-100);
            padding: 4px 10px;
            border-radius: 20px;
        }
        .activity-option .price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-dark);
            white-space: nowrap;
        }

        /* ========== Yacht Accordion ========== */
        .yacht-accordion {
            border: 2px solid var(--gray-200);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .yacht-accordion:hover {
            border-color: var(--primary-light);
        }
        .yacht-accordion.open {
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(0, 180, 216, 0.1);
        }
        .yacht-acc-header {
            display: grid;
            grid-template-columns: 60px 1fr auto auto auto;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .yacht-acc-header:hover {
            background: rgba(0, 180, 216, 0.02);
        }
        .yacht-acc-thumb {
            width: 60px;
            height: 42px;
            object-fit: cover;
            border-radius: 8px;
        }
        .yacht-acc-info .name {
            font-weight: 700;
            color: var(--dark);
            font-size: 0.95rem;
        }
        .yacht-acc-info .duration {
            font-size: 0.78rem;
            color: var(--gray-500);
            margin-top: 2px;
        }
        .yacht-acc-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--gray-200);
            color: var(--gray-600);
            vertical-align: middle;
            margin-left: 6px;
        }
        .yacht-acc-badge.premium {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
        }
        .yacht-acc-badge.luxury {
            background: linear-gradient(135deg, #c9a84c, #a68a3a);
            color: white;
        }
        .yacht-acc-header .capacity {
            font-size: 0.8rem;
            color: var(--gray-400);
            background: var(--gray-100);
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .yacht-acc-header .price {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-dark);
            white-space: nowrap;
        }
        .yacht-acc-arrow {
            font-size: 0.75rem;
            color: var(--gray-400);
            transition: transform 0.3s ease;
        }
        .yacht-accordion.open .yacht-acc-arrow {
            transform: rotate(180deg);
            color: var(--primary);
        }
        .yacht-acc-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: var(--gray-50, #f8fbfe);
            border-top: 0 solid var(--gray-200);
        }
        .yacht-accordion.open .yacht-acc-body {
            max-height: 500px;
            border-top-width: 1px;
            padding: 8px 12px 12px;
        }
        .yacht-acc-body .activity-option {
            border-width: 1px;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
        }
        .yacht-acc-body .activity-option:last-child {
            margin-bottom: 0;
        }
        @media (max-width: 768px) {
            .yacht-acc-header {
                grid-template-columns: 50px 1fr auto;
                gap: 10px;
            }
            .yacht-acc-header .capacity,
            .yacht-acc-header .yacht-acc-arrow {
                display: none;
            }
            .yacht-acc-thumb {
                width: 50px;
                height: 36px;
            }
        }

        /* ========== Form Fields ========== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-grid .full { grid-column: 1 / -1; }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--gray-700);
        }
        .field input, .field select, .field textarea {
            padding: 14px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: var(--font-primary);
            transition: border-color 0.3s ease;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.1);
        }

        /* ========== Date & Time Picker ========== */
        .datetime-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .guests-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* ========== Payment Section ========== */
        .payment-methods {
            display: grid;
            gap: 12px;
            margin-bottom: 25px;
        }
        .payment-method {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 20px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .payment-method:hover { border-color: var(--primary-light); }
        .payment-method.selected {
            border-color: var(--primary);
            background: rgba(0, 180, 216, 0.04);
        }
        .payment-method input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }
        .payment-method .method-info h5 {
            font-size: 0.95rem;
            margin-bottom: 3px;
        }
        .payment-method .method-info p {
            font-size: 0.82rem;
            color: var(--gray-500);
        }
        .payment-icons {
            margin-left: auto;
            display: flex;
            gap: 8px;
            font-size: 1.4rem;
            color: var(--gray-400);
        }

        .card-fields {
            display: none;
            background: var(--gray-100);
            border-radius: 12px;
            padding: 25px;
            margin-top: 15px;
        }
        .card-fields.visible { display: block; }
        .card-number-field {
            position: relative;
        }
        .card-number-field .card-brand {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            color: var(--gray-400);
        }

        /* ========== Deposit Option ========== */
        .deposit-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        .deposit-option {
            flex: 1;
            padding: 18px 20px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }
        .deposit-option.selected {
            border-color: var(--primary);
            background: rgba(0, 180, 216, 0.05);
        }
        .deposit-option .amount {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-dark);
        }
        .deposit-option .label {
            font-size: 0.82rem;
            color: var(--gray-500);
            margin-top: 4px;
        }

        /* ========== Terms Checkbox ========== */
        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 25px 0;
            padding: 18px;
            background: var(--gray-100);
            border-radius: 10px;
        }
        .terms-check input {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            accent-color: var(--primary);
        }
        .terms-check label {
            font-size: 0.85rem;
            color: var(--gray-600);
            line-height: 1.6;
        }
        .terms-check a {
            color: var(--primary);
            text-decoration: underline;
        }

        /* ========== Navigation Buttons ========== */
        .step-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--gray-200);
        }
        .btn-back {
            padding: 14px 30px;
            border-radius: 50px;
            border: 2px solid var(--gray-300);
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            border-color: var(--gray-400);
        }
        .btn-next {
            padding: 14px 35px;
            border-radius: 50px;
            border: none;
            background: var(--gradient-primary);
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.3);
        }

        /* ========== Order Summary Sidebar ========== */
        .order-summary {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            position: sticky;
            top: 100px;
        }
        .order-summary h4 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--gray-200);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 0.9rem;
        }
        .summary-row .label { color: var(--gray-500); }
        .summary-row .value { font-weight: 600; color: var(--dark); }
        .summary-divider {
            border-top: 1px solid var(--gray-200);
            margin: 10px 0;
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            font-size: 16px;
            font-weight: 800;
            color: var(--dark);
        }
        .summary-total .total-price {
            color: var(--primary-dark);
        }

        .summary-badges {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-200);
        }
        .summary-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.82rem;
            color: var(--gray-600);
        }
        .summary-badge i {
            color: #10b981;
            width: 18px;
        }

        .summary-whatsapp {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            background: #25d366;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .summary-whatsapp:hover {
            background: #1fb655;
            transform: translateY(-2px);
        }

        /* ========== Confirmation ========== */
        .confirmation {
            text-align: center;
            padding: 60px 40px;
        }
        .confirmation-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #34d399);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 2rem;
            color: white;
        }
        .confirmation h3 {
            font-size: 1.6rem;
            margin-bottom: 12px;
        }
        .confirmation p {
            color: var(--gray-500);
            max-width: 450px;
            margin: 0 auto 30px;
        }
        .booking-ref {
            background: var(--gray-100);
            border-radius: 10px;
            padding: 15px 25px;
            display: inline-block;
            margin-bottom: 30px;
        }
        .booking-ref .ref-label {
            font-size: 0.8rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .booking-ref .ref-number {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary-dark);
        }

        /* ========== Policies Bar ========== */
        .policies-bar {
            background: white;
            padding: 30px 0;
            border-top: 1px solid var(--gray-200);
        }
        .policies-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            text-align: center;
        }
        .policy-item i {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            display: block;
        }
        .policy-item h5 {
            font-size: 0.85rem;
            color: var(--dark);
            margin-bottom: 4px;
        }
        .policy-item p {
            font-size: 0.78rem;
            color: var(--gray-500);
        }

        @media (max-width: 992px) {
            .booking-layout { grid-template-columns: 1fr; }
            .booking-steps { flex-wrap: wrap; }
            .step { font-size: 0.8rem; }
            .form-grid { grid-template-columns: 1fr; }
            .policies-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 576px) {
            .step-panel { padding: 25px 20px; }
            .booking-page-hero h1 { font-size: 32px; }
            .datetime-grid, .guests-grid { grid-template-columns: 1fr; }
            .deposit-toggle { flex-direction: column; }
            .policies-grid { grid-template-columns: 1fr; }
            .dob-grid { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
            .dob-grid select { font-size: 0.85rem; padding: 12px 8px; }
            .activity-option { padding: 12px; }
            .activity-option .option-grid { grid-template-columns: 1fr auto; gap: 8px; }
        }
        /* ========== DOB Dropdown Grid ========== */
        .dob-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
        }
        .dob-grid select {
            padding: 14px 12px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: var(--font-primary);
            transition: border-color 0.3s ease;
            background: #fff;
            color: var(--dark);
            cursor: pointer;
            appearance: auto;
        }
        .dob-grid select:focus { border-color: var(--primary); outline: none; }

        /* ========== Full Payment Box (non-boat) ========== */
        .full-payment-box {
            border: 2px solid #10b981;
            border-radius: 12px;
            padding: 24px;
            background: rgba(16,185,129,0.03);
            text-align: center;
        }
        .full-payment-box .full-payment-label {
            font-weight: 700;
            font-size: 1rem;
            color: var(--dark);
            margin-bottom: 8px;
        }
        .full-payment-box .full-payment-amount {
            font-size: 1.6rem;
            font-weight: 800;
            color: #065f46;
        }
        .full-payment-box .full-payment-note {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-top: 6px;
        }
        .validation-msg { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 10px; padding: 14px 18px; margin: 15px 0; font-size: 0.88rem; color: #92400e; display: none; align-items: center; gap: 10px; }
        .validation-msg i { color: #f59e0b; font-size: 1.1rem; }
        .validation-msg.visible { display: flex; }

        /* ========== Inline Calendar Widget ========== */
        .calendar-container { background: white; border: 2px solid var(--gray-200); border-radius: 12px; padding: 20px; }
        .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .calendar-header h5 { font-size: 1rem; font-weight: 700; color: var(--dark); margin: 0; }
        .calendar-nav { background: none; border: 2px solid var(--gray-200); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; color: var(--gray-600); }
        .calendar-nav:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,180,216,0.05); }
        .calendar-nav:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .calendar-day-header { text-align: center; font-size: 0.72rem; font-weight: 700; color: var(--gray-400); padding: 8px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .calendar-day { text-align: center; padding: 10px 2px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--dark); border: 2px solid transparent; line-height: 1; }
        .calendar-day:hover:not(.disabled):not(.empty) { background: rgba(0,180,216,0.08); border-color: rgba(0,180,216,0.3); }
        .calendar-day.today { border-color: var(--primary); font-weight: 700; }
        .calendar-day.selected { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; font-weight: 700; box-shadow: 0 2px 8px rgba(0,180,216,0.3); }
        .calendar-day.disabled { color: var(--gray-300); cursor: not-allowed; text-decoration: line-through; opacity: 0.5; }
        .calendar-day.empty { cursor: default; }
        .calendar-selected-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: rgba(16,185,129,0.08); border: 2px solid #10b981; border-radius: 10px; margin-top: 14px; font-weight: 600; font-size: 0.9rem; color: #065f46; }
        .calendar-selected-bar i { color: #10b981; font-size: 1.1rem; }
        .calendar-selected-bar.hidden { display: none; }

        /* ========== Boat Deposit Box ========== */
        .boat-deposit-box { border: 2px solid var(--primary); border-radius: 12px; padding: 24px; background: rgba(0,180,216,0.03); }
        .boat-deposit-amount { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .boat-deposit-label { font-weight: 700; font-size: 1rem; color: var(--dark); }
        .boat-deposit-value { font-size: 1.6rem; font-weight: 800; color: var(--primary-dark); }
        .boat-deposit-info { display: flex; gap: 10px; padding: 14px; background: rgba(0,180,216,0.06); border-radius: 10px; }
        .boat-deposit-info i { color: var(--primary); margin-top: 2px; flex-shrink: 0; }
        .boat-deposit-info p { font-size: 0.85rem; color: var(--gray-600); margin: 0; line-height: 1.5; }
        .boat-balance-note { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 0.85rem; color: var(--gray-600); }
        .boat-balance-note strong { color: var(--dark); }
    </style>

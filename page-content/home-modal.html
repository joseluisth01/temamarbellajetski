
    <!-- Boat Detail Modal -->
    <div class="boat-modal-overlay" id="boatModal" onclick="if(event.target===this)closeBoatModal()">
        <div class="boat-modal">
            <button class="boat-modal-close" onclick="closeBoatModal()" aria-label="Close"><i class="fas fa-times"></i></button>
            <div class="boat-modal-body">
                <div class="boat-modal-gallery">
                    <div class="boat-modal-main-img">
                        <img id="boatModalMainImg" src="" alt="">
                        <button class="boat-gallery-nav boat-gallery-prev" onclick="changeBoatImage(-1)"><i class="fas fa-chevron-left"></i></button>
                        <button class="boat-gallery-nav boat-gallery-next" onclick="changeBoatImage(1)"><i class="fas fa-chevron-right"></i></button>

                    <div class="boat-modal-thumbs" id="boatModalThumbs"></div>

                    </div>

            </div>
        </div>
